<!-- @dsCard group="Components" viewport="700x340" name="Core Components" subtitle="Button, Card, Badge, Tag, Avatar, Divider" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: var(--font-body); background: var(--neutral-50); padding: 20px 24px; }
  .section { margin-bottom: 18px; }
  .section-label { font-size: 10px; font-weight: 600; color: var(--text-secondary); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  function Button({ children, variant = 'primary', size = 'md', fullWidth = false, disabled = false, onClick, style = {} }) {
    const [hovered, setHovered] = React.useState(false);
    const base = { display:'inline-flex', alignItems:'center', justifyContent:'center', gap:'var(--space-2)', fontFamily:'var(--font-body)', fontWeight:'var(--weight-medium)', letterSpacing:'var(--tracking-wide)', border:'none', cursor:disabled?'not-allowed':'pointer', transition:'all var(--duration-normal) var(--ease-default)', width:fullWidth?'100%':'auto', opacity:disabled?0.5:1, borderRadius:'var(--radius-md)', whiteSpace:'nowrap' };
    const sizes = { sm:{padding:'var(--space-2) var(--space-4)',fontSize:'var(--text-sm)'}, md:{padding:'var(--space-3) var(--space-6)',fontSize:'var(--text-sm)'}, lg:{padding:'var(--space-4) var(--space-8)',fontSize:'var(--text-base)'} };
    const vars = { primary:{background:'var(--interactive-primary)',color:'var(--interactive-primary-text)'}, secondary:{background:'transparent',color:'var(--color-rosa-dark)',boxShadow:'inset 0 0 0 1.5px var(--color-rosa)'}, ghost:{background:'transparent',color:'var(--text-secondary)'}, dark:{background:'var(--neutral-900)',color:'var(--color-white)'} };
    const hvr = { primary:{background:'var(--interactive-primary-hover)'}, secondary:{background:'var(--color-rosa-lighter)'}, ghost:{background:'var(--neutral-100)'}, dark:{background:'var(--neutral-800)'} };
    const merged = { ...base, ...sizes[size], ...vars[variant], ...(hovered&&!disabled?hvr[variant]:{}), ...style };
    return <button style={merged} disabled={disabled} onClick={onClick} onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)}>{children}</button>;
  }

  function Badge({ children, variant = 'rosa', size = 'sm', style = {} }) {
    const vars = { rosa:{background:'var(--color-rosa-lighter)',color:'var(--color-rosa-dark)'}, neutral:{background:'var(--neutral-100)',color:'var(--neutral-600)'}, success:{background:'#e8f2ea',color:'#5a8a64'}, warning:{background:'#f5eddf',color:'#9a7a42'}, error:{background:'#f5e3e3',color:'#a05050'} };
    const sizes = { sm:{padding:'var(--space-1) var(--space-2)',fontSize:'var(--text-xs)'}, md:{padding:'var(--space-1) var(--space-3)',fontSize:'var(--text-sm)'} };
    return <span style={{ display:'inline-flex', alignItems:'center', borderRadius:'var(--radius-full)', fontFamily:'var(--font-body)', fontWeight:'var(--weight-medium)', letterSpacing:'var(--tracking-wide)', lineHeight:'1.4', whiteSpace:'nowrap', ...sizes[size], ...vars[variant], ...style }}>{children}</span>;
  }

  function Tag({ children, dismissible = false, onDismiss }) {
    return <span style={{ display:'inline-flex', alignItems:'center', gap:'var(--space-1)', padding:'var(--space-1) var(--space-3)', borderRadius:'var(--radius-full)', fontFamily:'var(--font-body)', fontSize:'var(--text-xs)', fontWeight:'var(--weight-medium)', letterSpacing:'var(--tracking-wide)', color:'var(--color-grigio-dark)', background:'var(--neutral-100)', border:'1px solid var(--neutral-200)', lineHeight:'1.4' }}>
      {children}
      {dismissible && <button onClick={onDismiss} style={{ display:'inline-flex', alignItems:'center', background:'none', border:'none', cursor:'pointer', padding:0, marginLeft:2, color:'var(--color-grigio)', fontSize:14, lineHeight:1 }}>×</button>}
    </span>;
  }

  function Avatar({ initials = '', size = 40, style = {} }) {
    return <div style={{ width:size, height:size, borderRadius:'var(--radius-full)', display:'inline-flex', alignItems:'center', justifyContent:'center', flexShrink:0, background:'var(--color-rosa-light)', color:'var(--color-rosa-dark)', fontFamily:'var(--font-body)', fontWeight:'var(--weight-medium)', fontSize:size*0.38, letterSpacing:'var(--tracking-wide)', ...style }}>{initials.slice(0,2).toUpperCase()}</div>;
  }

  function Divider({ ornament = false, spacing = 'sm' }) {
    const sp = { sm:'var(--space-4)', md:'var(--space-8)', lg:'var(--space-12)' };
    if (ornament) return <div style={{ display:'flex', alignItems:'center', gap:'var(--space-4)', margin:sp[spacing]+' 0' }}><div style={{ flex:1, height:1, background:'var(--border-default)' }}></div><div style={{ width:6, height:6, borderRadius:'var(--radius-full)', background:'var(--color-rosa)' }}></div><div style={{ flex:1, height:1, background:'var(--border-default)' }}></div></div>;
    return <div style={{ height:1, background:'var(--border-default)', margin:sp[spacing]+' 0' }}></div>;
  }

  function Card({ children, variant = 'default', padding = 'sm', onClick, style = {} }) {
    const [hovered, setHovered] = React.useState(false);
    const ic = !!onClick;
    const pads = { none:'0', sm:'var(--space-4)', md:'var(--space-6)', lg:'var(--space-8)' };
    const vars = { default:{background:'var(--surface-card)',boxShadow:hovered&&ic?'var(--shadow-md)':'var(--shadow-sm)'}, outlined:{background:'var(--surface-card)',boxShadow:'none',border:'1px solid '+(hovered&&ic?'var(--border-accent)':'var(--border-default)')}, elevated:{background:'var(--surface-card)',boxShadow:hovered&&ic?'var(--shadow-lg)':'var(--shadow-md)'}, accent:{background:'var(--surface-accent)',boxShadow:'none'} };
    return <div style={{ borderRadius:'var(--radius-md)', padding:pads[padding], cursor:ic?'pointer':'default', transition:'all var(--duration-normal) var(--ease-default)', ...vars[variant], ...style }} onClick={onClick} onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)}>{children}</div>;
  }

  function App() {
    return (
      <div>
        <div className="section">
          <div className="section-label">Button</div>
          <div className="row">
            <Button variant="primary" size="sm">Primary SM</Button>
            <Button variant="primary" size="md">Primary MD</Button>
            <Button variant="primary" size="lg">Primary LG</Button>
            <Button variant="secondary" size="md">Secondary</Button>
            <Button variant="ghost" size="md">Ghost</Button>
            <Button variant="primary" size="md" disabled>Disabled</Button>
          </div>
        </div>
        <div className="section">
          <div className="section-label">Badge</div>
          <div className="row">
            <Badge variant="rosa">Featured</Badge>
            <Badge variant="neutral">Draft</Badge>
            <Badge variant="success">Confirmed</Badge>
            <Badge variant="warning">Pending</Badge>
            <Badge variant="error">Cancelled</Badge>
            <Badge variant="rosa" size="md">Medium Size</Badge>
          </div>
        </div>
        <div className="section">
          <div className="section-label">Tag</div>
          <div className="row">
            <Tag>Florals</Tag>
            <Tag>Photography</Tag>
            <Tag dismissible>Catering</Tag>
            <Tag dismissible>Music</Tag>
          </div>
        </div>
        <div className="section">
          <div className="section-label">Avatar</div>
          <div className="row">
            <Avatar initials="CM" size={48} />
            <Avatar initials="MR" size={40} />
            <Avatar initials="L" size={32} />
            <Avatar initials="A" size={28} />
          </div>
        </div>
        <div className="section">
          <div className="section-label">Divider</div>
          <div style={{ width: '100%' }}>
            <Divider spacing="sm" />
            <Divider ornament spacing="sm" />
          </div>
        </div>
        <div className="section">
          <div className="section-label">Card</div>
          <div className="row" style={{ alignItems: 'stretch' }}>
            <Card variant="default" padding="sm" style={{ flex: 1 }}>
              <div style={{ fontFamily:'var(--font-body)', fontSize:'var(--text-md)', fontWeight:'var(--weight-medium)', marginBottom:4, color:'var(--text-primary)' }}>Default Card</div>
              <div style={{ fontSize:'var(--text-sm)', color:'var(--text-secondary)' }}>Subtle shadow</div>
            </Card>
            <Card variant="outlined" padding="sm" style={{ flex: 1 }}>
              <div style={{ fontFamily:'var(--font-body)', fontSize:'var(--text-md)', fontWeight:'var(--weight-medium)', marginBottom:4, color:'var(--text-primary)' }}>Outlined</div>
              <div style={{ fontSize:'var(--text-sm)', color:'var(--text-secondary)' }}>Border, no shadow</div>
            </Card>
            <Card variant="accent" padding="sm" style={{ flex: 1 }}>
              <div style={{ fontFamily:'var(--font-body)', fontSize:'var(--text-md)', fontWeight:'var(--weight-medium)', marginBottom:4, color:'var(--text-primary)' }}>Accent</div>
              <div style={{ fontSize:'var(--text-sm)', color:'var(--text-secondary)' }}>Rosa tint</div>
            </Card>
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
