<!-- @dsCard group="Components" viewport="700x220" name="Form Controls" subtitle="Input — text fields with labels, validation, multiline" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: var(--font-body); background: var(--color-white); padding: 20px 24px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  function Input({ label, placeholder, value, onChange, type = 'text', multiline = false, rows = 3, disabled = false, error, helperText, fullWidth = false, className = '', style = {} }) {
    const [focused, setFocused] = React.useState(false);
    const wrapStyle = { display:'flex', flexDirection:'column', gap:'var(--space-1)', width:fullWidth?'100%':'auto', fontFamily:'var(--font-body)', ...style };
    const labelStyle = { fontSize:'var(--text-sm)', fontWeight:'var(--weight-medium)', color:'var(--text-primary)', letterSpacing:'var(--tracking-wide)' };
    const inputStyle = { fontFamily:'var(--font-body)', fontSize:'var(--text-base)', padding:'var(--space-3) var(--space-4)', borderRadius:'var(--radius-md)',
      border:'1.5px solid '+(error?'var(--status-error)':focused?'var(--border-focus)':'var(--border-default)'),
      outline:'none', background:disabled?'var(--neutral-50)':'var(--surface-card)', color:'var(--text-primary)',
      transition:'border-color var(--duration-fast) var(--ease-default)', opacity:disabled?0.6:1, width:'100%', resize:multiline?'vertical':'none' };
    const helperStyle = { fontSize:'var(--text-xs)', color:error?'var(--status-error)':'var(--text-muted)', marginTop:'2px' };
    const inputEl = multiline
      ? <textarea placeholder={placeholder} value={value} onChange={onChange} disabled={disabled} rows={rows} style={inputStyle} onFocus={()=>setFocused(true)} onBlur={()=>setFocused(false)} />
      : <input type={type} placeholder={placeholder} value={value} onChange={onChange} disabled={disabled} style={inputStyle} onFocus={()=>setFocused(true)} onBlur={()=>setFocused(false)} />;
    return <div className={className} style={wrapStyle}>{label && <label style={labelStyle}>{label}</label>}{inputEl}{(error||helperText) && <span style={helperStyle}>{error||helperText}</span>}</div>;
  }

  function App() {
    return (
      <div className="grid">
        <Input label="Full Name" placeholder="Enter your name" fullWidth />
        <Input label="Email" type="email" placeholder="you@example.com" fullWidth />
        <Input label="Phone Number" type="tel" placeholder="+39" fullWidth />
        <Input label="Wedding Date" type="date" fullWidth />
        <Input label="Destination" placeholder="e.g. Capri, Amalfi Coast…" fullWidth />
        <Input label="Message" multiline rows={2} placeholder="Tell us about your vision…" fullWidth style={{ gridColumn: '1 / -1' }} />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
