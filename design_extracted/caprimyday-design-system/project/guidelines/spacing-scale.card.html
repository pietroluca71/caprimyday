<!-- @dsCard group="Spacing" viewport="700x120" name="Spacing Scale" subtitle="4px base unit — 4 through 96px" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: var(--font-body); background: var(--color-white); display: flex; align-items: flex-end; justify-content: center; height: 120px; padding: 16px 24px; gap: 8px; }
  .bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .bar { background: var(--color-rosa); border-radius: 3px; width: 28px; }
  .label { font-size: 9px; color: var(--text-secondary); font-family: monospace; }
</style>
</head>
<body>
  <div class="bar-wrap"><div class="bar" style="height: 4px;"></div><span class="label">4</span></div>
  <div class="bar-wrap"><div class="bar" style="height: 8px;"></div><span class="label">8</span></div>
  <div class="bar-wrap"><div class="bar" style="height: 12px;"></div><span class="label">12</span></div>
  <div class="bar-wrap"><div class="bar" style="height: 16px;"></div><span class="label">16</span></div>
  <div class="bar-wrap"><div class="bar" style="height: 20px;"></div><span class="label">20</span></div>
  <div class="bar-wrap"><div class="bar" style="height: 24px;"></div><span class="label">24</span></div>
  <div class="bar-wrap"><div class="bar" style="height: 32px;"></div><span class="label">32</span></div>
  <div class="bar-wrap"><div class="bar" style="height: 40px;"></div><span class="label">40</span></div>
  <div class="bar-wrap"><div class="bar" style="height: 48px;"></div><span class="label">48</span></div>
  <div class="bar-wrap"><div class="bar" style="height: 64px;"></div><span class="label">64</span></div>
  <div class="bar-wrap"><div class="bar" style="height: 80px;"></div><span class="label">80</span></div>
</body>
</html>
