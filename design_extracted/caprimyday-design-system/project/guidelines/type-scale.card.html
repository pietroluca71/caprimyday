<!-- @dsCard group="Type" viewport="700x200" name="Type Scale" subtitle="Modular scale from text-xs (12px) to text-5xl (60px)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: var(--color-white); display: flex; flex-direction: column; justify-content: center; height: 200px; padding: 12px 28px; gap: 0; }
  .row { display: flex; align-items: baseline; gap: 12px; }
  .size-label { font-family: monospace; font-size: 10px; color: var(--text-secondary); width: 56px; flex-shrink: 0; text-align: right; }
  .sample { font-family: var(--font-display); color: var(--color-grigio); line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>
  <div class="row"><span class="size-label">60px</span><span class="sample" style="font-size: var(--text-5xl);">Capri</span></div>
  <div class="row"><span class="size-label">48px</span><span class="sample" style="font-size: var(--text-4xl);">My Day</span></div>
  <div class="row"><span class="size-label">36px</span><span class="sample" style="font-size: var(--text-3xl);">Wedding & Event</span></div>
  <div class="row"><span class="size-label">24px</span><span class="sample" style="font-size: var(--text-xl);">Il giorno perfetto</span></div>
  <div class="row"><span class="size-label">18px</span><span class="sample" style="font-size: var(--text-md); font-family: var(--font-body);">Every detail, curated for you</span></div>
  <div class="row"><span class="size-label">16px</span><span class="sample" style="font-size: var(--text-base); font-family: var(--font-body);">We bring your vision to life on the most beautiful island</span></div>
  <div class="row"><span class="size-label">14px</span><span class="sample" style="font-size: var(--text-sm); font-family: var(--font-body); color: var(--text-secondary);">Venues · Florals · Catering · Photography · Entertainment</span></div>
</body>
</html>
