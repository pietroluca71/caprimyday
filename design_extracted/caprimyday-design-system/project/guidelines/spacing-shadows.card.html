<!-- @dsCard group="Spacing" viewport="700x130" name="Shadows" subtitle="Elevation scale from xs to xl" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: var(--font-body); background: var(--neutral-100); display: flex; align-items: center; justify-content: center; height: 130px; padding: 16px 28px; gap: 20px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 72px; height: 56px; background: var(--color-white); border-radius: var(--radius-md); }
  .label { font-size: 10px; color: var(--text-secondary); font-family: monospace; }
</style>
</head>
<body>
  <div class="item"><div class="box" style="box-shadow: var(--shadow-xs);"></div><span class="label">xs</span></div>
  <div class="item"><div class="box" style="box-shadow: var(--shadow-sm);"></div><span class="label">sm</span></div>
  <div class="item"><div class="box" style="box-shadow: var(--shadow-md);"></div><span class="label">md</span></div>
  <div class="item"><div class="box" style="box-shadow: var(--shadow-lg);"></div><span class="label">lg</span></div>
  <div class="item"><div class="box" style="box-shadow: var(--shadow-xl);"></div><span class="label">xl</span></div>
</body>
</html>
