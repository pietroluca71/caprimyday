<!-- @dsCard group="Type" viewport="700x170" name="Body Type" subtitle="DM Sans — body copy, subtitles, and UI text" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: var(--font-body); background: var(--color-white); display: flex; flex-direction: column; justify-content: center; height: 170px; padding: 20px 28px; gap: 8px; }
  .label { font-size: 10px; color: var(--text-secondary); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 500; margin-bottom: 2px; }
  .line { color: var(--color-grigio); line-height: var(--leading-normal); }
</style>
</head>
<body>
  <div class="label">DM Sans · 300–600</div>
  <div class="line" style="font-size: var(--text-xl); font-weight: 300;">Light — We plan. You celebrate.</div>
  <div class="line" style="font-size: var(--text-md); font-weight: 400;">Regular — Every wedding is unique, shaped by your story and the beauty of the island.</div>
  <div class="line" style="font-size: var(--text-base); font-weight: 500;">Medium — Venues · Florals · Catering · Photography</div>
  <div class="line" style="font-size: var(--text-sm); font-weight: 600; color: var(--color-rosa-dark);">Semibold — View Our Services →</div>
</body>
</html>
