<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: var(--font-display); background: var(--color-white); display: flex; flex-direction: column; justify-content: center; height: 160px; padding: 20px 28px; gap: 6px; }
  .line { color: var(--color-grigio); line-height: var(--leading-tight); }
  .label { font-family: var(--font-body); font-size: 10px; color: var(--text-secondary); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 500; margin-bottom: 4px; }
</style>
</head>
<body>
  <div class="label">DM Serif Display · 400</div>
  <div class="line" style="font-size: var(--text-5xl);">Every Detail</div>
  <div class="line" style="font-size: var(--text-3xl); color: var(--color-rosa);">Curated for You</div>
</body>
</html>
