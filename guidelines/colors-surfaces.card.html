<!-- @dsCard group="Colors" viewport="700x110" name="Semantic Surfaces" subtitle="Page, card, muted, accent, and dark surface tokens" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: var(--font-body); background: #e8eaea; display: flex; align-items: center; justify-content: center; height: 110px; padding: 14px; gap: 10px; }
  .swatch { flex: 1; height: 80px; border-radius: var(--radius-md); display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 10px; }
  .swatch span { font-size: 10px; font-weight: 500; letter-spacing: 0.02em; }
</style>
</head>
<body>
  <div class="swatch" style="background: var(--surface-page); color: var(--neutral-600); border: 1px solid var(--neutral-200);"><span>Page</span></div>
  <div class="swatch" style="background: var(--surface-muted); color: var(--neutral-600); border: 1px solid var(--neutral-200);"><span>Muted</span></div>
  <div class="swatch" style="background: var(--surface-accent); color: var(--neutral-700);"><span>Accent</span></div>
  <div class="swatch" style="background: var(--surface-accent-bold); color: #fff;"><span>Accent Bold</span></div>
  <div class="swatch" style="background: var(--surface-dark); color: #fff;"><span>Dark</span></div>
</body>
</html>
