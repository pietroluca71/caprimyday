<!-- @dsCard group="Type" viewport="700x100" name="Type Pairing" subtitle="Display + body in context — heading with paragraph" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: var(--color-white); display: flex; flex-direction: column; justify-content: center; height: 100px; padding: 16px 28px; gap: 6px; }
  h2 { font-family: var(--font-display); font-size: var(--text-2xl); font-weight: 400; color: var(--color-grigio); line-height: var(--leading-tight); }
  p { font-family: var(--font-body); font-size: var(--text-sm); color: var(--text-secondary); line-height: var(--leading-normal); max-width: 520px; }
</style>
</head>
<body>
  <h2>Your Dream, Our Dedication</h2>
  <p>From intimate elopements to grand celebrations, we craft every moment with care — so you can simply enjoy the magic of Capri.</p>
</body>
</html>
